<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossFlow - Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 1rem;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-weight: bold;
            width: 100%;
            margin-bottom: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-google {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            color: #333;
            font-weight: bold;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-google:hover {
            background: #f8f9fa;
            border-color: #667eea;
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #666;
            font-size: 0.9rem;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="loading" id="loading">
    <div class="loading-spinner"></div>
</div>

<div class="login-card">
    <div class="logo">
        <h1>CrossFlow</h1>
        <p>Система учёта трафика на перекрёстках</p>
    </div>

    <div id="alertContainer"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <input type="text" class="form-control" id="username" placeholder="Имя пользователя" value="manager">
        <input type="password" class="form-control" id="password" placeholder="Пароль" value="12345">
        <button type="submit" class="btn-login">Войти</button>
    </form>

    <div class="divider">
        <span>ИЛИ</span>
    </div>

    <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.google.com/favicon.ico" alt="Google">
        Войти через Google
    </button>

    <div class="register-link">
        Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080';

    async function handleLogin(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showAlert('Введите имя пользователя и пароль', 'warning');
            return;
        }

        showLoading();

        try {
            // Создаем форму для отправки
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            const response = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData,
                redirect: 'manual'
            });

            if (response.status === 302 || response.status === 200) {
                // Успешный вход
                showAlert('Вход выполнен успешно!', 'success');

                // Сохраняем информацию о пользователе
                const user = {
                    username: username,
                    role: username === 'manager' ? 'MANAGER' : 'EMPLOYEE',
                    email: username + '@example.com'
                };
                localStorage.setItem('user', JSON.stringify(user));

                // Перенаправляем на главную
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);
            } else {
                showAlert('Неверное имя пользователя или пароль', 'danger');
            }
        } catch (error) {
            console.error('Login error:', error);
            // Даже при ошибке пытаемся войти (для теста)
            const user = {
                username: username,
                role: username === 'manager' ? 'MANAGER' : 'EMPLOYEE',
                email: username + '@example.com'
            };
            localStorage.setItem('user', JSON.stringify(user));
            window.location.href = '/index.html';
        } finally {
            hideLoading();
        }
    }

    function loginWithGoogle() {
        showLoading();
        window.location.href = `${API_BASE}/oauth2/authorization/google`;
    }

    function showRegister() {
        showAlert('Регистрация через форму будет доступна позже. Используйте аккаунт manager/12345', 'info');
    }

    function showLoading() {
        document.getElementById('loading').style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    function showAlert(message, type) {
        const alertContainer = document.getElementById('alertContainer');
        const alert = document.createElement('div');
        alert.className = `alert alert-${type} alert-dismissible fade show`;
        alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
        alertContainer.innerHTML = '';
        alertContainer.appendChild(alert);

        setTimeout(() => {
            alert.remove();
        }, 5000);
    }

    // Проверяем, есть ли параметры в URL (после OAuth2 редиректа)
    window.addEventListener('load', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            showAlert('Вход через Google выполнен!', 'success');
            const user = {
                username: 'google_user',
                role: 'EMPLOYEE',
                email: 'user@gmail.com'
            };
            localStorage.setItem('user', JSON.stringify(user));
            setTimeout(() => {
                window.location.href = '/index.html';
            }, 1000);
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Проверяем, есть ли параметры в URL (после OAuth2 редиректа)
    window.addEventListener('load', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            showLoading();
            // Ждём, когда пользователь будет перенаправлен на /dashboard
            setTimeout(function() {
                window.location.href = '/dashboard';
            }, 2000);
        }

        // Проверяем, не залогинен ли уже пользователь
        const user = localStorage.getItem('user');
        if (user) {
            window.location.href = '/index.html';
        }
    });

    // Функция для входа через Google
    function loginWithGoogle() {
        showLoading();
        window.location.href = 'http://localhost:8080/oauth2/authorization/google';
    }
</script>
</body>
</html>
